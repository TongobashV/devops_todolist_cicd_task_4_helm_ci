name: python-deployment

run-name: ${{ github.actor }} - ${{ github.ref_name }} - ${{ github.sha }}

on:
  push:
    branches: ["your_name"]
  pull_request:
    branches: ["your_name"]

env:
  PythonVersion: 3.8
  # ЗАМЕНИ todoapp на свое имя репозитория в DockerHub
  DockerImageName: "your_dockerhub_repo_name" 

jobs:
  # 1. НОВОЕ ЗАДАНИЕ: Подготовка исходного кода (Один checkout на весь запуск)
  prep-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # ИЗВЛЕКАЕМ ТОЛЬКО ОДИН РАЗ ЗДЕСЬ

      - name: Upload full workspace as artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-repo-source
          path: .

  python-ci:
    runs-on: ubuntu-latest
    needs: prep-code
    defaults:
      run:
        working-directory: ./src
    steps:
      - name: Download source code
        uses: actions/download-artifact@v4
        with:
          name: full-repo-source
          path: .

      - name: Set up Python ${{ env.PythonVersion }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PythonVersion }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage flake8
          pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

      - name: Upload python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts
          path: ./src

  docker-ci:
    name: Docker CI
    needs: [prep-code, python-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Download source code
        uses: actions/download-artifact@v4
        with:
          name: full-repo-source
          path: .

      - name: Download python build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-artifacts
          path: ./src

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DockerImageName }}:${{ github.sha }}

  helm-ci:
    name: Helm CI
    needs: [prep-code, docker-ci]
    runs-on: ubuntu-latest
    steps:
      # ТРЕБОВАНИЕ: Скачать Helm артефакты (код репозитория с чартами) перед операциями
      - name: Download Helm source code
        uses: actions/download-artifact@v4
        with:
          name: full-repo-source
          path: .

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Helm Lint
        run: helm lint ./helm-charts/todoapp # ПРОВЕРЬ ПУТЬ В СВОЕМ РЕПО

      - name: Helm Template
        run: helm template my-release ./helm-charts/todoapp

      - name: Helm Package
        run: helm package ./helm-charts/todoapp

      - name: Upload Helm Package
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-package
          path: ./*.tgz